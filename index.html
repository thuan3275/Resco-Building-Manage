<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghi Chỉ Số Nước</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .border-dashed { border: 2px dashed #ccc; border-radius: 10px; cursor: pointer; }
        #preview { max-height: 300px; object-fit: contain; width: 100%; }
    </style>
</head>
<body class="bg-light">
    <!-- KHỐI ĐĂNG NHẬP -->
    <div id="loginSection" class="container mt-5">
        <div class="card shadow p-4 text-center border-0">
            <i class="fa fa-user-circle fa-4x mb-3 text-primary"></i>
            <h3>Đăng Nhập</h3>
            <p class="text-muted">Hệ thống ghi chỉ số nội bộ</p>
            <input type="text" id="staffId" class="form-control my-3 py-2" placeholder="Nhập mã nhân viên">
            <button class="btn btn-primary w-100 py-2 fw-bold" onclick="handleLogin()">XÁC NHẬN</button>
        </div>
    </div>

    <!-- KHỐI ỨNG DỤNG CHÍNH -->
    <div id="appSection" class="container mt-3" style="display:none;">
        <div id="userInfo" class="mb-3"></div>
        
        <div id="adminLink" style="display:none;" class="mb-3">
            <button class="btn btn-warning w-100 fw-bold shadow-sm" onclick="goToAdmin()">
                <i class="fa fa-user-shield"></i> TRUY CẬP TRANG QUẢN TRỊ
            </button>
        </div>

        <div class="card shadow-sm border-0 p-3">
            <div class="mb-3">
                <label class="form-label fw-bold small text-uppercase">Mã Thiết bị (ID)</label>
                <input type="text" id="deviceId" class="form-control" placeholder="Ví dụ: DN-001">
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold small text-uppercase">Chỉ số nước (m³)</label>
                <input type="number" id="meterValue" class="form-control" placeholder="0.00">
            </div>

            <div class="camera-container text-center p-3 border-dashed mb-3" onclick="document.getElementById('camInput').click()">
                <div id="camPlaceholder">
                    <i class="fa fa-camera fa-2x mb-2 text-secondary"></i>
                    <p class="text-secondary mb-0 small">Nhấn để chụp ảnh đồng hồ</p>
                </div>
                <input type="file" id="camInput" accept="image/*" capture="environment" hidden>
                <img id="preview" class="img-fluid rounded mt-2 shadow-sm" style="display:none;">
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold small text-uppercase">Ghi chú</label>
                <textarea id="note" class="form-control" rows="2" placeholder="Tình trạng thiết bị..."></textarea>
            </div>

            <button class="btn btn-success w-100 py-3 fw-bold shadow" id="btnSubmit" onclick="uploadData()">
                <i class="fa fa-paper-plane"></i> GỬI DỮ LIỆU
            </button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="script.js"></script>
</body>
</html>
